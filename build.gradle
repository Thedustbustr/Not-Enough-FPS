plugins {
    id 'net.fabricmc.fabric-loom' version "${loom_version}"
}

repositories {
    maven { url 'https://api.modrinth.com/maven' }
    maven { url 'https://gitlab.com/api/v4/projects/76146809/packages/maven' }
    maven { url 'https://gitlab.com/api/v4/projects/76147521/packages/maven' }
}

version = project.mod_version
group = project.maven_group

base {
    archivesName = 'not-enough-fps'
}

dependencies {
    minecraft "com.mojang:minecraft:${project.minecraft_version}"

    implementation("maven.modrinth:sodium:${project.sodium_version}-fabric")
    implementation "net.fabricmc:fabric-loader:${project.loader_version}"
    implementation "net.fabricmc.fabric-api:fabric-api:${project.fabric_version}"

    include implementation("net.thedustbuster.libs:core:${project.java_libs_core_version}")
    include implementation("net.thedustbuster.libs:func:${project.java_libs_functional_version}")
}

processResources {
    inputs.property "version", project.version

    filesMatching("fabric.mod.json") {
        expand "version": project.version
    }
}

tasks.withType(JavaCompile).configureEach {
    it.options.release = 25
    options.compilerArgs << "-Xlint:deprecation"
}

java {
    sourceCompatibility = JavaVersion.VERSION_25
    targetCompatibility = JavaVersion.VERSION_25
}

jar {
    from("LICENSE") {
        rename { "${it}_${inputs.properties.archivesName}" }
    }
}